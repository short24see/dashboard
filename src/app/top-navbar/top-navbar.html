<header class="top-nav">
    <div class="left">
        <span class="app-name">
            <img style="max-width: 222px; width: 120px; margin: 0 2.5rem; align-items: center;justify-content: center;"
                [src]="'assets/images/jayanitha.png'" alt="logo">
        </span>

        <span class="v-divider"></span>

        <span class="env">Demo environment</span>
        <div><span class="status">
                ●
            </span> <span class="status-text">
                System ready
            </span></div>
    </div>

    <div class="right">
        <div class="user">
            <span class="avatar">{{ avatarInitial }}</span>
            <div class="user-details">
                <span class="User">{{ userName }}</span>
                <span class="user-email" [matTooltip]="userEmail">{{ userEmail }}</span>
            </div>
            <button mat-icon-button type="button" class="logout-btn" matTooltip="Logout" (click)="logout()">
                <mat-icon>logout</mat-icon>
            </button>
        </div>
    </div>
</header>


<div class="app-body">
    <aside class="sidebar">

        <div class="nav-section">
            <button class="nav-item active" routerLink="/dashboard" routerLinkActive="active"
                [class.active]="activeNav === 'dashboard'" (click)="setActive('dashboard')">
                <mat-icon style="font-size: 21px;">home</mat-icon>
                <span>Dashboard</span>
            </button>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
            <button class="nav-item nav-title active" routerLink="/mis" routerLinkActive="active"
                [class.active]="activeNav === 'mis'" (click)="setActive('mis')">
                <span class="nav-title-text">
                    <mat-icon>dashboard</mat-icon>
                    MIS</span>
            </button>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
            <button class="nav-item nav-title active" routerLink="/bom" routerLinkActive="active"
                [class.active]="activeNav === 'bom'" (click)="setActive('bom')">
                <span class="nav-title-text">
                    <mat-icon>account_tree</mat-icon>BOM</span>
            </button>
        </div>


        <div class="nav-divider"></div>

        <div class="nav-section">
            <button class="nav-item nav-title active" routerLink="/stock" routerLinkActive="active"
                [class.active]="activeNav === 'stock'" (click)="setActive('stock')">
                <span class="nav-title-text">
                    <mat-icon>stacked_bar_chart</mat-icon>Stock</span>
            </button>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
            <button class="nav-item nav-title active" routerLink="/asset" routerLinkActive="active"
                [class.active]="activeNav === 'asset'" (click)="setActive('asset')">
                <span class="nav-title-text">
                    <mat-icon>account_balance</mat-icon>Assets</span>
            </button>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
            <button class="nav-item nav-title active" routerLink="/configuration" routerLinkActive="active"
                [class.active]="activeNav === 'configuration'" (click)="setActive('configuration')">
                <span class="nav-title-text">
                    <mat-icon>settings</mat-icon>Configuration</span>
            </button>
        </div>

    </aside>

    <main [ngClass]="activeNav === 'dashboard'? 'main-content': 'mis-content'">
        <router-outlet></router-outlet>
    </main>
</div>
