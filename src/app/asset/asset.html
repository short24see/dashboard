<!-- Net Current Assets -->
<div class="headers">
    <div>
        <div>Net Current Assets (fig in Cr)</div>
        <span class="updated">Last updated: {{lastUpdated || 'Loading...'}}</span>
    </div>
    <button class="refresh-btn" (click)="loadNetCurrentAssets()" [disabled]="isLoading">
        {{isLoading ? 'Refreshing...' : 'Refresh Data'}}
    </button>
</div>
<div class="status error" *ngIf="loadError">{{loadError}}</div>
<div class="modern-table-wrapper table-scroll">
    <div class="empty-state" *ngIf="!isLoading && !netCurrentAssetsData.length">No Net Current Assets data available.</div>

    <table mat-table [dataSource]="netCurrentAssetsData" class="modern-table" sticky>

        <!-- Particulars -->
        <ng-container matColumnDef="particulars">
            <th mat-header-cell *matHeaderCellDef>Particulars</th>
            <td mat-cell *matCellDef="let row" [class.total]="row.total">
                {{ row.particulars }}
            </td>
        </ng-container>

        <!-- Dec-25 -->
        <ng-container matColumnDef="dec25">
            <th mat-header-cell *matHeaderCellDef>{{period}}</th>
            <td mat-cell *matCellDef="let row" [class.total]="row.total">
                {{ valueFor(row) }}
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedNcaColumns ;sticky:true" class="particular-col-3rd-table">
        </tr>
        <tr mat-row *matRowDef="let row; columns: displayedNcaColumns"></tr>

    </table>
</div>
